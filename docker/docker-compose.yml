services:
  postgres:
    image: postgres:16-alpine
    container_name: japanvip_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: japanvip
      POSTGRES_PASSWORD: japanvip_dev_password
      POSTGRES_DB: japanvip_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U japanvip -d japanvip_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: japanvip_redis
    restart: unless-stopped
    command: redis-server --requirepass japanvip_redis_password --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "japanvip_redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: japanvip_mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  postgres_data:
  redis_data:
