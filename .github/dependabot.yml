version: 2
updates:
  - package-ecosystem: npm
    directories:
      - "/"
      - "/apps/web"
      - "/packages/db"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    # Bỏ qua MỌI major bump — major (Tailwind 4, Next 16, Prisma 7, Zod 4, TS 6…)
    # cần migration có chủ đích; PR major auto luôn fail build → nhiễu. Chỉ nhận
    # minor/patch (vá bảo mật, nhóm minor-and-patch). Lên major thì làm migration tay.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
